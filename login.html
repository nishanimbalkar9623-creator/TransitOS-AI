<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TransitOS AI</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <!-- Background Orbs -->
  <div class="glow-orb orb-left"></div>
  <div class="glow-orb orb-right"></div>

  <div class="auth-wrapper">
    <!-- Logo -->
    <a href="index.html" class="logo-container">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 17L17 7M17 7H7M17 7V17" />
          <path d="M17 17L7 7M7 7H17M7 7V17" opacity="0.3"/>
        </svg>
      </div>
      Transit<span>OS</span> AI
    </a>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-header">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Log in to manage predictive freight metrics</p>
      </div>

      <!-- Dev Mode Banner -->
      <div class="dev-banner" id="dev-mode-banner" style="display: none;">
        <span class="dev-banner-dot"></span>
        Running in Local Dev Mode (No Supabase keys set in supabase-config.js)
      </div>

      <!-- Error Message Banner -->
      <div class="error-banner" id="error-message-banner"></div>

      <form id="login-form">
        <!-- Email Address -->
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-submit" id="submit-btn">Login</button>

        <!-- Redirect Link -->
        <p class="auth-footer-link">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </p>

        <!-- Demo Accounts Section -->
        <div class="demo-divider">Quick Demo Access</div>
        <div class="demo-buttons-row">
          <button type="button" class="btn-demo" id="demo-company-btn">Demo as Company</button>
          <button type="button" class="btn-demo" id="demo-trucker-btn">Demo as Truck Owner</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Load Supabase Config & SDK CDN -->
  <script src="supabase-config.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js?v=2"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const devBanner = document.getElementById('dev-mode-banner');
      const errorBanner = document.getElementById('error-message-banner');
      const form = document.getElementById('login-form');
      const submitBtn = document.getElementById('submit-btn');
      const emailInput = document.getElementById('login-email');
      const passwordInput = document.getElementById('login-password');

      const demoCompanyBtn = document.getElementById('demo-company-btn');
      const demoTruckerBtn = document.getElementById('demo-trucker-btn');

      // Check if fallback mode is active
      if (window.isLocalFallback) {
        devBanner.style.display = 'flex';
      }

      // Pre-fill demo controls
      demoCompanyBtn.addEventListener('click', () => {
        emailInput.value = "company@transitos.ai";
        passwordInput.value = "password123";
        form.requestSubmit(); // Triggers submit handler validation
      });

      demoTruckerBtn.addEventListener('click', () => {
        emailInput.value = "truckowner@transitos.ai";
        passwordInput.value = "password123";
        form.requestSubmit();
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        errorBanner.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        const result = await loginUser(email, password);

        if (result.success) {
          if (result.role === 'company') {
            window.location.href = 'index.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          errorBanner.textContent = result.message;
          errorBanner.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Login';
        }
      });
    });
  </script>
</body>
</html>
